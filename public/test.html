<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Alchemy Pay 回调测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #262626;
      min-height: 100vh;
      padding: 24px 16px 40px;
      -webkit-text-size-adjust: 100%;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }

    .status {
      font-size: 14px;
      color: #595959;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .section:last-of-type {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .section-desc {
      font-size: 13px;
      color: #8c8c8c;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .countdown {
      font-size: 40px;
      font-weight: 700;
      color: #52c41a;
      text-align: center;
      margin: 8px 0 4px;
      min-height: 48px;
    }

    .countdown-label {
      font-size: 13px;
      color: #8c8c8c;
      text-align: center;
      margin-bottom: 12px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 500;
      color: #fff;
      background: #1677ff;
      border: none;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:active { background: #0958d9; }

    .btn-success {
      background: #52c41a;
    }

    .btn-success:active { background: #389e0d; }

    .btn-fail {
      background: #ff4d4f;
    }

    .btn-fail:active { background: #cf1322; }

    .tips {
      margin-top: 18px;
      padding: 12px;
      background: #fffbe6;
      border: 1px solid #ffe58f;
      border-radius: 8px;
      font-size: 12px;
      color: #8c6d1f;
      line-height: 1.6;
    }

    .tips strong { color: #614700; }

    .target-url {
      margin-top: 8px;
      font-size: 11px;
      color: #bfbfbf;
      word-break: break-all;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Alchemy Pay 回调测试</h1>

    <div class="section">
      <p class="section-title">成功回调</p>
      <p class="section-desc">倒计时结束后自动跳转到成功回调地址</p>
      <p class="status" id="successStatus">正在倒计时，即将自动跳转…</p>
      <div class="countdown" id="countdown">5</div>
      <p class="countdown-label">秒后自动跳转</p>
      <a class="btn btn-success" id="successBtn" href="https://cex.eqrrwa.com/app/alchemyPay/payResult?status=success">
        立即跳转成功回调
      </a>
      <p class="target-url" id="successUrl"></p>
    </div>

    <div class="section">
      <p class="section-title">失败回调</p>
      <p class="section-desc">仅手动点击触发，不会自动跳转</p>
      <a class="btn btn-fail" id="failBtn" href="https://cex.eqrrwa.com/app/alchemyPay/payResult?status=fail">
        手动触发失败回调
      </a>
      <p class="target-url" id="failUrl"></p>
    </div>

    <div class="tips">
      <strong>说明</strong><br>
      1. 成功回调：<code>?status=success</code>，5 秒倒计时后自动跳转<br>
      2. 失败回调：<code>?status=fail</code>，需用户手动点击红色按钮<br>
      3. 本页须通过 <strong>HTTPS</strong> 访问
    </div>
  </div>

  <script>
    (function () {
      var SUCCESS_URL = "https://cex.eqrrwa.com/app/alchemyPay/payResult?status=success";
      var countdownEl = document.getElementById("countdown");
      var successStatus = document.getElementById("successStatus");
      var successBtn = document.getElementById("successBtn");
      var successUrlEl = document.getElementById("successUrl");
      var failUrlEl = document.getElementById("failUrl");
      var remaining = 5;
      var timerId = null;
      var redirected = false;

      successBtn.href = SUCCESS_URL;
      successUrlEl.textContent = "成功地址：" + SUCCESS_URL;
      failUrlEl.textContent = "失败地址：https://cex.eqrrwa.com/app/alchemyPay/payResult?status=fail";

      function stopTimer() {
        if (timerId !== null) {
          clearInterval(timerId);
          timerId = null;
        }
      }

      function redirectToSuccess() {
        if (redirected) return;
        redirected = true;
        stopTimer();
        successStatus.textContent = "正在跳转到成功回调…";
        countdownEl.textContent = "0";
        window.location.href = SUCCESS_URL;
      }

      function updateCountdown() {
        countdownEl.textContent = String(remaining);
        if (remaining <= 0) {
          redirectToSuccess();
          return;
        }
        remaining -= 1;
      }

      successBtn.addEventListener("click", function () {
        stopTimer();
        redirected = true;
      });

      updateCountdown();
      timerId = setInterval(updateCountdown, 1000);
    })();
  </script>
</body>
</html>
